# ==============================
# HYPRLAND KEYBINDINGS
# ==============================
# Vim-inspired keybindings for consistency

# Set main modifier key
$mainMod = SUPER

# ==============================
# APPLICATION SHORTCUTS
# ==============================

# Terminal
bind = $mainMod, Return, exec, foot
bind = $mainMod, Q, exec, foot

# Applications
bind = $mainMod, B, exec, firefox
bind = $mainMod, E, exec, thunar
bind = $mainMod, R, exec, rofi -show drun
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mainMod SHIFT, V, exec, foot -e clipse

# System utilities
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod SHIFT, E, exec, wlogout

# ==============================
# WINDOW MANAGEMENT
# ==============================

# Close/Kill windows
bind = $mainMod, C, killactive
bind = $mainMod SHIFT, C, exec, hyprctl kill

# Window states
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1
bind = $mainMod, M, fullscreen, 1  # Maximize
bind = $mainMod SHIFT, Space, togglefloating
bind = $mainMod, P, pseudo  # dwindle
bind = $mainMod, T, togglesplit  # dwindle

# ==============================
# FOCUS MANAGEMENT (VIM KEYS)
# ==============================

# Focus windows - Vim style navigation
bind = $mainMod, H, movefocus, l  # Left
bind = $mainMod, J, movefocus, d  # Down  
bind = $mainMod, K, movefocus, u  # Up
bind = $mainMod, L, movefocus, r  # Right

# Alternative arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, down, movefocus, d
bind = $mainMod, up, movefocus, u
bind = $mainMod, right, movefocus, r

# Tab through windows
bind = $mainMod, Tab, cyclenext
bind = $mainMod, Tab, bringactivetotop

# ==============================
# WINDOW MOVEMENT (SHIFT + VIM)
# ==============================

# Move windows - Vim style with Shift
bind = $mainMod SHIFT, H, movewindow, l  # Left
bind = $mainMod SHIFT, J, movewindow, d  # Down
bind = $mainMod SHIFT, K, movewindow, u  # Up
bind = $mainMod SHIFT, L, movewindow, r  # Right

# Alternative arrow keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, right, movewindow, r

# ==============================
# WINDOW RESIZING (ALT + VIM)
# ==============================

# Resize windows - Vim style with Alt
bind = $mainMod ALT, H, resizeactive, -30 0   # Shrink width
bind = $mainMod ALT, L, resizeactive, 30 0    # Grow width
bind = $mainMod ALT, K, resizeactive, 0 -30   # Shrink height
bind = $mainMod ALT, J, resizeactive, 0 30    # Grow height

# Alternative arrow keys
bind = $mainMod ALT, left, resizeactive, -30 0
bind = $mainMod ALT, right, resizeactive, 30 0
bind = $mainMod ALT, up, resizeactive, 0 -30
bind = $mainMod ALT, down, resizeactive, 0 30

# ==============================
# WORKSPACE MANAGEMENT
# ==============================

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Navigate workspaces relatively
bind = $mainMod, N, workspace, r+1
bind = $mainMod, Prior, workspace, r-1  # Page Up
bind = $mainMod SHIFT, N, movetoworkspace, r+1
bind = $mainMod SHIFT, Prior, movetoworkspace, r-1

# Move to first empty workspace
bind = $mainMod CTRL, E, workspace, empty

# ==============================
# SPECIAL WORKSPACES
# ==============================

# Scratchpad
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# ==============================
# MOUSE BINDINGS
# ==============================

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Workspace switching with mouse scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# ==============================
# MEDIA AND FUNCTION KEYS
# ==============================

# Volume control
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness control
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 10%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# Media control
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# Media shortcuts with main modifier
bind = $mainMod, bracketright, exec, playerctl next
bind = $mainMod, bracketleft, exec, playerctl previous
bind = $mainMod, backslash, exec, playerctl play-pause

# ==============================
# SCREENSHOTS
# ==============================

# Screenshot shortcuts
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot" "Area copied to clipboard"
bind = $mainMod, Print, exec, grim - | wl-copy && notify-send "Screenshot" "Screen copied to clipboard"
bind = SHIFT, Print, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +'%Y%m%d_%H%M%S').png && notify-send "Screenshot" "Area saved"
bind = $mainMod SHIFT, Print, exec, grim ~/Pictures/Screenshots/$(date +'%Y%m%d_%H%M%S').png && notify-send "Screenshot" "Screen saved"

# ==============================
# GROUPS AND TABS
# ==============================

# Group management
bind = $mainMod, G, togglegroup
bind = $mainMod SHIFT, G, lockactivegroup, toggle
bind = $mainMod CTRL, G, moveoutofgroup

# Group navigation
bind = $mainMod, comma, changegroupactive, b   # Previous in group
bind = $mainMod, period, changegroupactive, f  # Next in group

# ==============================
# LAYOUT SPECIFIC
# ==============================

# Layout switching
bind = $mainMod ALT, D, exec, hyprctl keyword general:layout "dwindle"
bind = $mainMod ALT, M, exec, hyprctl keyword general:layout "master"

# Master layout specific
bind = $mainMod CTRL, Return, layoutmsg, swapwithmaster
bind = $mainMod CTRL, M, layoutmsg, focusmaster

# ==============================
# SYSTEM CONTROLS
# ==============================

# Session management
bind = $mainMod SHIFT, Q, exit
bind = $mainMod ALT, L, exec, hyprlock
bind = $mainMod ALT, S, exec, systemctl suspend

# Reload Hyprland
bind = $mainMod CTRL SHIFT, R, exec, hyprctl reload

# Kill window by click
bind = $mainMod ALT, Q, exec, hyprctl kill

# ==============================
# PASSTHROUGH MODE
# ==============================

# Pass all keys to focused application
bind = $mainMod, F12, submap, passthru
submap = passthru
bind = $mainMod, F12, submap, reset
submap = reset